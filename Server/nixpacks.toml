# nixpacks.toml for Railway deployment
# Configures system packages to support headless Chromium and Puppeteer

[phases.setup]
nixPkgs = [
  "nodejs",
  "chromium",
  "glib",
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "libxkbcommon",
  "at-spi2-core",
  "libxcomposite",
  "libxdamage",
  "libxrandr",
  "libgbm",
  "pango",
  "cairo",
  "alsa-lib",
  "dbus"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "chromium"
